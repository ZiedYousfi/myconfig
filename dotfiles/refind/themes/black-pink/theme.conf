# Managed by setup-config.
banner themes/black-pink/banner.png
banner_scale fillscreen
selection_big themes/black-pink/selection_big.png
selection_small themes/black-pink/selection_small.png
hideui hints,label,singleuser,arrows,badges
use_graphics_for + linux,windows

# Intentionally NOT setting `showtools` here: the stock refind.conf already
# defines a sensible default (shutdown, reboot, firmware, ...). Re-declaring
# it from the theme produced visible duplicate icons on the second row.
#
# Intentionally NOT overriding `scanfor` here either: the stock default is
# fine, and overriding it from the theme can fight with refind.conf.
